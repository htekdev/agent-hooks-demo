name: Block Sensitive Files
description: >
  Prevents agents from creating or editing files that commonly contain secrets,
  such as .env files, private keys, and anything in a secrets/ directory.
on:
  file:
    lifecycle: pre
    paths:
      - '**/.env'
      - '**/.env.*'
      - '**/secrets/**'
      - '**/*.pem'
      - '**/*.key'
    types: [create, edit]
blocking: true
steps:
  - name: Deny access to sensitive files
    run: |
      echo "🚫 BLOCKED: Cannot create or edit sensitive file."
      echo ""
      echo "  File: ${{ event.file.path }}"
      echo ""
      echo "  Files matching these patterns are protected:"
      echo "    • .env / .env.*    (environment variables)"
      echo "    • secrets/**       (secrets directory)"
      echo "    • *.pem / *.key    (private keys & certificates)"
      echo ""
      echo "  Manage secrets through your CI/CD platform or a vault instead."
      exit 1
